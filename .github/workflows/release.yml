name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Build Release APKs
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && '/tmp/release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk" .apk)
            # Extract ABI from filename (app-arm64-v8a-release → arm64-v8a)
            abi=$(echo "$filename" | sed 's/app-//;s/-release//')
            if [ "$abi" = "universal" ]; then
              cp "$apk" "dist/openclaw-phoneuse-${VERSION}-universal.apk"
            else
              cp "$apk" "dist/openclaw-phoneuse-${VERSION}-${abi}.apk"
            fi
          done
          ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openclaw-phoneuse-*.apk
          generate_release_notes: true
