name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk openclaw-phoneuse-${VERSION}-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: openclaw-phoneuse-*-debug.apk
          generate_release_notes: true
